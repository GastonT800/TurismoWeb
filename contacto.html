<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Turismo Explora</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/contacto.css">
</head>

<body>

    <header id="main-header"></header>

    <main>

        <!-- HERO -->
        <section class="hero-secondary">
            <h1>¿Listo para tu próxima aventura?</h1>
            <p>Dejanos tu mensaje y te contactamos en breve</p>
        </section>

        <!-- FORMULARIO -->
        <section class="contact-section">

            <div class="contact-card">

                <form id="contactForm" class="form-grid" novalidate>

                    <!-- NOMBRE -->
                    <div class="form-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" placeholder="Ej: Juan Pérez" required minlength="2">
                        <span class="error-msg">Nombre inválido</span>
                    </div>

                    <!-- EMAIL -->
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@email.com" required>
                        <span class="error-msg">Email inválido</span>
                    </div>

                    <!-- MENSAJE -->
                    <div class="form-group full">
                        <label for="message">Mensaje</label>
                        <textarea id="message" rows="5" placeholder="Escribí tu consulta..." required
                            minlength="10"></textarea>
                        <span class="error-msg">Mínimo 10 caracteres</span>
                    </div>

                    <!-- BOTÓN -->
                    <div class="form-group full">
                        <button type="submit" class="cta-button" id="submitBtn">
                            <span class="btn-text">Enviar Mensaje</span>
                        </button>
                    </div>

                </form>

            </div>

        </section>

    </main>

    <!-- MODAL -->
    <div class="modal" id="modalConfirm">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h3>¡Mensaje enviado!</h3>
            <p>Nos contactaremos contigo pronto</p>
            <button onclick="cerrarModal()" class="close-modal-btn">Cerrar</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer id="main-footer"></footer>

    <!-- BOTÓN MODO OSCURO -->
    <button class="toggle-theme" onclick="toggleMode()" aria-label="Cambiar modo oscuro">
        🌙 Modo
    </button>

    <!-- JS -->
    <script src="script.js"></script>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const form = this;

            // Validación HTML5
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const btn = document.getElementById("submitBtn");

            // Spinner ON
            btn.classList.add("loading");
            btn.disabled = true;

            setTimeout(() => {
                btn.classList.remove("loading");
                btn.disabled = false;

                form.reset();

                document.getElementById("modalConfirm").classList.add("show");

            }, 2000);
        });

        function cerrarModal() {
            document.getElementById("modalConfirm").classList.remove("show");
        }
    </script>

</body>

</html>
